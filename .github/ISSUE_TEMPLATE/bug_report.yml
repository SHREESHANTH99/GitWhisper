name: Bug Report
description: Report a reproducible GitWhisper bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please include enough detail for us to reproduce it.
  - type: input
    id: version
    attributes:
      label: GitWhisper version
      description: Run `gitwhisper --version` if available, or share the release/tag/commit.
      placeholder: v0.1.0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Commands, config, and repository conditions that trigger the issue.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Redact secrets before pasting logs.
      render: shell
