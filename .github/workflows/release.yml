name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: linux-x86_64
            binary: gitwhisper
            archive: tar.gz
          - os: macos-latest
            asset: macos-x86_64
            binary: gitwhisper
            archive: tar.gz
          - os: windows-latest
            asset: windows-x86_64
            binary: gitwhisper.exe
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Unix binary
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.binary }}" "dist/"
          cp README.md LICENSE CHANGELOG.md "dist/"
          tar -czf "gitwhisper-${{ github.ref_name }}-${{ matrix.asset }}.tar.gz" -C dist .

      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/${{ matrix.binary }}" "dist/"
          Copy-Item README.md, LICENSE, CHANGELOG.md "dist/"
          Compress-Archive -Path "dist/*" -DestinationPath "gitwhisper-${{ github.ref_name }}-${{ matrix.asset }}.zip"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: gitwhisper-${{ github.ref_name }}-${{ matrix.asset }}
          path: gitwhisper-${{ github.ref_name }}-${{ matrix.asset }}.*

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: GitWhisper ${{ github.ref_name }}
          body_path: docs/releases/${{ github.ref_name }}.md
          files: dist/*
          generate_release_notes: true
