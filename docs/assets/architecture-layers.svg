<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitWhisper architecture layers</title>
  <desc id="desc">A layered diagram showing capture, analysis, collaboration, storage, and delivery surfaces in GitWhisper.</desc>
  <defs>
    <style>
      .page-bg { fill: #0a0f0e; }
      .card-bg { fill: #0d1816; stroke: #1e5449; stroke-width: 1.5; }
      .layer-box { fill: #0f2620; stroke: #1e5449; stroke-width: 1.5; }
      .title-main { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 22px; font-weight: 700; }
      .title-sub { fill: #8a9a95; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11.5px; }
      .label-green { fill: #4ade80; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 700; }
      .label-yellow { fill: #fbbf24; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 700; }
      .label-orange { fill: #fb923c; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 700; }
      .text-body { fill: #9aa9a0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; }
      .text-body-sm { fill: #7a8a80; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 10px; }
      .flow-line { stroke: #fbbf24; stroke-width: 1.5; fill: none; stroke-linecap: round; }
      .flow-dash { stroke: #fbbf24; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-dasharray: 4,3; }
    </style>
  </defs>

  <rect width="1200" height="430" class="page-bg"/>
  <rect x="30" y="20" width="1140" height="390" rx="18" class="card-bg"/>

  <text x="55" y="50" class="title-main">GitWhisper platform layers</text>
  <text x="55" y="68" class="title-sub">
    <tspan x="55" dy="0">Repository signals flow through capture, analysis, AI, collaboration, storage, and reporting.</tspan>
  </text>
  <path d="M 140 76 Q 360 60 580 70 T 1040 76" class="flow-line"/>

  <g>
    <rect x="60" y="110" width="180" height="230" rx="14" class="layer-box"/>
    <text x="78" y="138" class="label-green">Local-first</text>
    <line x1="78" y1="148" x2="220" y2="148" stroke="#4ade80" stroke-width="0.8" opacity="0.4"/>
    <text x="78" y="174" class="text-body">JSON storage</text>
    <text x="78" y="192" class="text-body">Git notes</text>
    <text x="78" y="210" class="text-body">Local cache</text>
    <text x="78" y="228" class="text-body">Zero-setup</text>
  </g>

  <g>
    <rect x="270" y="110" width="500" height="76" rx="12" class="layer-box"/>
    <text x="288" y="136" class="label-yellow">Capture</text>
    <text x="288" y="156" class="text-body-sm">git commit · hook · IDE context · environment</text>
    <text x="288" y="170" class="text-body-sm">review signals · CI metadata</text>
    <path d="M 520 186 L 520 210" class="flow-line"/>
  </g>

  <g>
    <rect x="270" y="214" width="500" height="92" rx="12" class="layer-box"/>
    <text x="288" y="242" class="label-yellow">Analyze</text>
    <text x="288" y="262" class="text-body-sm">diff parsing · intent detection · impact analysis</text>
    <text x="288" y="276" class="text-body-sm">quality / security / performance scoring</text>
  </g>

  <g>
    <rect x="820" y="110" width="240" height="230" rx="14" class="layer-box"/>
    <text x="840" y="138" class="label-orange">Team-ready</text>
    <line x1="840" y1="148" x2="1040" y2="148" stroke="#fb923c" stroke-width="0.8" opacity="0.4"/>
    <text x="840" y="174" class="text-body">PostgreSQL</text>
    <text x="840" y="192" class="text-body">Dashboards</text>
    <text x="840" y="210" class="text-body">Web API</text>
    <text x="840" y="228" class="text-body">Team sync</text>
  </g>

  <path d="M 240 146 L 270 146" class="flow-dash"/>
  <path d="M 240 249 L 270 249" class="flow-dash"/>
  <path d="M 770 146 L 820 146" class="flow-dash"/>
  <path d="M 770 258 L 820 258" class="flow-dash"/>

  <g>
    <text x="60" y="352" class="label-orange">Delivery</text>
    <text x="60" y="370" class="text-body-sm">CLI reports · Git notes · wiki pages · ADRs · Slack / Discord</text>
    <text x="60" y="384" class="text-body-sm">PR / MR summaries · dashboards</text>
  </g>
</svg>
