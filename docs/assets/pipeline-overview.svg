<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitWhisper pipeline overview</title>
  <desc id="desc">A pipeline diagram showing capture, analysis, explanation, and sharing for GitWhisper.</desc>
  <defs>
    <style>
      .page-bg { fill: #0a0f0e; }
      .card-bg { fill: #0d1816; stroke: #1e5449; stroke-width: 1.5; }
      .main-box { fill: #0f2620; stroke: #1e5449; stroke-width: 1.5; }
      .flow-box { fill: #0f2620; stroke: #1e5449; stroke-width: 1.5; }
      .title-main { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 24px; font-weight: 700; }
      .title-sub { fill: #9aa9a0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; }
      .button-text { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; font-weight: 600; }
      .flow-label { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 15px; font-weight: 700; }
      .flow-desc { fill: #9aa9a0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 10.5px; }
      .flow-line { stroke: #fbbf24; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .button-border { stroke: #4ade80; stroke-width: 1.5; fill: none; }
      .button-border-orange { stroke: #fb923c; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="420" class="page-bg"/>
  <rect x="30" y="20" width="1140" height="380" rx="18" class="card-bg"/>

  <g>
    <rect x="60" y="60" width="420" height="280" rx="16" class="main-box"/>
    <text x="85" y="105" class="title-main">GitWhisper</text>
    <text x="85" y="135" class="title-sub">Commit intelligence for teams who need the why,</text>
    <text x="85" y="152" class="title-sub">the risk, and the next best action.</text>

    <rect x="85" y="185" width="90" height="32" rx="16" class="button-border"/>
    <text x="97" y="206" class="button-text" style="fill: #4ade80;">Rust CLI</text>

    <rect x="185" y="185" width="120" height="32" rx="16" class="button-border-orange"/>
    <text x="198" y="206" class="button-text" style="fill: #fb923c;">Local-first AI</text>

    <rect x="315" y="185" width="70" height="32" rx="16" class="button-border-orange"/>
    <text x="332" y="206" class="button-text" style="fill: #fb923c;">Team</text>
  </g>

  <g>
    <rect x="540" y="80" width="170" height="86" rx="12" class="flow-box"/>
    <text x="558" y="110" class="flow-label" style="fill: #4ade80;">Capture</text>
    <text x="558" y="132" class="flow-desc">Git + IDE + CI</text>
    <path d="M 625 166 L 625 196" class="flow-line"/>
    <polygon points="625,201 620,193 630,193" fill="#fbbf24"/>
  </g>

  <g>
    <rect x="540" y="196" width="170" height="86" rx="12" class="flow-box"/>
    <text x="558" y="226" class="flow-label" style="fill: #fbbf24;">Analyze</text>
    <text x="558" y="248" class="flow-desc">Intent + impact</text>
    <path d="M 710 239 L 745 239" class="flow-line"/>
    <polygon points="750,239 742,244 742,234" fill="#fbbf24"/>
  </g>

  <g>
    <rect x="755" y="196" width="170" height="86" rx="12" class="flow-box"/>
    <text x="773" y="226" class="flow-label" style="fill: #fbbf24;">Explain</text>
    <text x="773" y="248" class="flow-desc">Gemini + Ollama</text>
    <path d="M 925 239 L 960 239" class="flow-line"/>
    <polygon points="965,239 957,244 957,234" fill="#fb923c"/>
  </g>

  <g>
    <rect x="970" y="196" width="170" height="86" rx="12" class="flow-box"/>
    <text x="988" y="226" class="flow-label" style="fill: #fb923c;">Share</text>
    <text x="988" y="248" class="flow-desc">PRs + Slack</text>
  </g>

  <path d="M 625 80 Q 700 52 820 80" stroke="#fb923c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
